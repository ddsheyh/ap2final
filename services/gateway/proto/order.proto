syntax = "proto3";

package order;

option go_package = "order-service/pkg/pb";

import "google/protobuf/timestamp.proto";

service OrderService {
  // Order CRUD
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);
  rpc GetOrder(GetOrderRequest) returns (GetOrderResponse);
  rpc ListOrders(ListOrdersRequest) returns (ListOrdersResponse);
  rpc UpdateOrder(UpdateOrderRequest) returns (UpdateOrderResponse);
  rpc DeleteOrder(DeleteOrderRequest) returns (DeleteOrderResponse);

  // Order operations
  rpc UpdateOrderStatus(UpdateOrderStatusRequest) returns (UpdateOrderStatusResponse);
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);
  rpc GetOrdersByUser(GetOrdersByUserRequest) returns (GetOrdersByUserResponse);

  // Order items
  rpc AddOrderItem(AddOrderItemRequest) returns (AddOrderItemResponse);
  rpc RemoveOrderItem(RemoveOrderItemRequest) returns (RemoveOrderItemResponse);
  rpc GetOrderItems(GetOrderItemsRequest) returns (GetOrderItemsResponse);
  rpc GetOrderTotal(GetOrderTotalRequest) returns (GetOrderTotalResponse);
}

message Order {
  int64 id = 1;
  int64 user_id = 2;
  string status = 3;
  double total_price = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
  repeated OrderItem items = 7;
}

message OrderItem {
  int64 id = 1;
  int64 order_id = 2;
  string product_name = 3;
  int32 quantity = 4;
  double price = 5;
  google.protobuf.Timestamp created_at = 6;
}

message CreateOrderRequest {
  int64 user_id = 1;
  repeated CreateOrderItemInput items = 2;
}

message CreateOrderItemInput {
  string product_name = 1;
  int32 quantity = 2;
  double price = 3;
}

message CreateOrderResponse {
  Order order = 1;
}

message GetOrderRequest {
  int64 id = 1;
}

message GetOrderResponse {
  Order order = 1;
}

message ListOrdersRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message ListOrdersResponse {
  repeated Order orders = 1;
  int32 total = 2;
}

message UpdateOrderRequest {
  int64 id = 1;
  string status = 2;
}

message UpdateOrderResponse {
  Order order = 1;
}

message DeleteOrderRequest {
  int64 id = 1;
}

message DeleteOrderResponse {
  bool success = 1;
}

message UpdateOrderStatusRequest {
  int64 order_id = 1;
  string status = 2;
}

message UpdateOrderStatusResponse {
  Order order = 1;
}

message CancelOrderRequest {
  int64 order_id = 1;
}

message CancelOrderResponse {
  Order order = 1;
}

message GetOrdersByUserRequest {
  int64 user_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message GetOrdersByUserResponse {
  repeated Order orders = 1;
  int32 total = 2;
}

message AddOrderItemRequest {
  int64 order_id = 1;
  string product_name = 2;
  int32 quantity = 3;
  double price = 4;
}

message AddOrderItemResponse {
  OrderItem item = 1;
}

message RemoveOrderItemRequest {
  int64 item_id = 1;
}

message RemoveOrderItemResponse {
  bool success = 1;
}

message GetOrderItemsRequest {
  int64 order_id = 1;
}

message GetOrderItemsResponse {
  repeated OrderItem items = 1;
}

message GetOrderTotalRequest {
  int64 order_id = 1;
}

message GetOrderTotalResponse {
  double total = 1;
  int32 item_count = 2;
}
