syntax = "proto3";

package payment;

option go_package = "payment-service/pkg/pb";

import "google/protobuf/timestamp.proto";

service PaymentService {
  // Payment CRUD
  rpc CreatePayment(CreatePaymentRequest) returns (CreatePaymentResponse);
  rpc GetPayment(GetPaymentRequest) returns (GetPaymentResponse);
  rpc ListPayments(ListPaymentsRequest) returns (ListPaymentsResponse);
  rpc GetPaymentsByOrder(GetPaymentsByOrderRequest) returns (GetPaymentsByOrderResponse);

  // Payment operations
  rpc UpdatePaymentStatus(UpdatePaymentStatusRequest) returns (UpdatePaymentStatusResponse);
  rpc CancelPayment(CancelPaymentRequest) returns (CancelPaymentResponse);
  rpc RefundPayment(RefundPaymentRequest) returns (RefundPaymentResponse);
  rpc GetPaymentsByUser(GetPaymentsByUserRequest) returns (GetPaymentsByUserResponse);

  // Transactions
  rpc ListTransactions(ListTransactionsRequest) returns (ListTransactionsResponse);
  rpc GetTransaction(GetTransactionRequest) returns (GetTransactionResponse);

  // Analytics & retry
  rpc GetPaymentStats(GetPaymentStatsRequest) returns (GetPaymentStatsResponse);
  rpc RetryPayment(RetryPaymentRequest) returns (RetryPaymentResponse);
}

message Payment {
  int64 id = 1;
  int64 order_id = 2;
  int64 user_id = 3;
  double amount = 4;
  string currency = 5;
  string status = 6;
  string payment_method = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

message Transaction {
  int64 id = 1;
  int64 payment_id = 2;
  string type = 3;
  double amount = 4;
  string status = 5;
  string description = 6;
  google.protobuf.Timestamp created_at = 7;
}

message CreatePaymentRequest {
  int64 order_id = 1;
  int64 user_id = 2;
  double amount = 3;
  string currency = 4;
  string payment_method = 5;
}

message CreatePaymentResponse {
  Payment payment = 1;
}

message GetPaymentRequest {
  int64 id = 1;
}

message GetPaymentResponse {
  Payment payment = 1;
}

message ListPaymentsRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message ListPaymentsResponse {
  repeated Payment payments = 1;
  int32 total = 2;
}

message GetPaymentsByOrderRequest {
  int64 order_id = 1;
}

message GetPaymentsByOrderResponse {
  repeated Payment payments = 1;
}

message UpdatePaymentStatusRequest {
  int64 payment_id = 1;
  string status = 2;
}

message UpdatePaymentStatusResponse {
  Payment payment = 1;
}

message CancelPaymentRequest {
  int64 payment_id = 1;
}

message CancelPaymentResponse {
  Payment payment = 1;
}

message RefundPaymentRequest {
  int64 payment_id = 1;
  double amount = 2;
}

message RefundPaymentResponse {
  Payment payment = 1;
  Transaction refund_transaction = 2;
}

message GetPaymentsByUserRequest {
  int64 user_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message GetPaymentsByUserResponse {
  repeated Payment payments = 1;
  int32 total = 2;
}

message ListTransactionsRequest {
  int64 payment_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message ListTransactionsResponse {
  repeated Transaction transactions = 1;
  int32 total = 2;
}

message GetTransactionRequest {
  int64 id = 1;
}

message GetTransactionResponse {
  Transaction transaction = 1;
}

message GetPaymentStatsRequest {
  int64 user_id = 1;
}

message GetPaymentStatsResponse {
  int32 total_payments = 1;
  double total_amount = 2;
  int32 successful_payments = 3;
  int32 failed_payments = 4;
  int32 refunded_payments = 5;
}

message RetryPaymentRequest {
  int64 payment_id = 1;
}

message RetryPaymentResponse {
  Payment payment = 1;
}
